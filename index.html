<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>迷你游戏集合</title>
<link rel="stylesheet" href="common/style.css">
</head>
<body>

<!-- ===== Header ===== -->
<header class="header">
  <div class="logo">🎮 迷你游戏集合</div>
  <div class="player-info" id="playerInfo" title="点击更换头像和名字">
    <span class="player-avatar" id="playerAvatar">👤</span>
    <span class="player-name" id="playerName">点击设置</span>
  </div>
</header>

<!-- ===== Main Content ===== -->
<main class="main-content" id="mainContent">
  <div class="section-title">🎯 选择一个游戏开始吧</div>
  <div class="game-grid" id="gameGrid"></div>
  <div class="lb-panel mt-24" id="homeLb">
    <h3>🏆 排行榜</h3>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;" id="lbSelector"></div>
    <div id="homeLbTable"></div>
  </div>
</main>

<!-- ===== Game Area (hidden by default) ===== -->
<div class="game-area hidden" id="gameArea">
  <div class="game-header">
    <button class="back-btn" id="btnBack" title="返回菜单">← 返回</button>
    <span class="game-title" id="gameTitle"></span>
    <span class="game-stats" id="gameStats"></span>
  </div>
  <div class="game-body" id="gameBody"></div>
</div>

<!-- ===== Player Setup Overlay ===== -->
<div class="overlay hidden" id="playerSetup">
  <div class="modal animate-in">
    <h2>👋 欢迎来到迷你游戏集合！</h2>
    <div class="subtitle">开始游戏前，先设置你的玩家信息吧</div>
    <input type="text" id="playerNameInput" placeholder="请输入你的名字" maxlength="12" autocomplete="off">
    <div class="subtitle mt-16">选择头像:</div>
    <div class="avatar-grid" id="avatarGrid"></div>
    <button class="btn btn-primary btn-block mt-16" id="btnStartPlaying">🎮 开始游戏</button>
  </div>
</div>

<!-- ===== Difficulty Selection Modal ===== -->
<div class="overlay hidden" id="diffModal">
  <div class="modal animate-in" id="diffContent"></div>
</div>

<!-- ===== Scripts ===== -->
<script src="common/engine.js"></script>
<script src="games/1a2b/game.js"></script>
<script src="games/24point/game.js"></script>
<script src="games/sokoban/game.js"></script>
<script src="games/hanoi/game.js"></script>
<script src="games/math/game.js"></script>
<script src="games/puzzle/game.js"></script>
<script src="games/wordgame/game.js"></script>
<script src="games/riddle/game.js"></script>

</body>
</html>
